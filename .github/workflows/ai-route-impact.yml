name: AI Route Dependency Diagram

permissions:
  pull-requests: write
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-diagram:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # fetch full history

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Generate route dependency diagram
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          cat > aiDiagram.js <<'EOF'
          const fs = require('fs');
          const fetch = require('node-fetch');
          const { execSync } = require('child_process');

          async function run() {
            let diff = "";
            try {
              diff = execSync('git fetch origin main && git diff origin/main...HEAD').toString();
            } catch (e) {
              console.warn("Git diff failed, using HEAD^ fallback");
              try { diff = execSync('git diff HEAD^').toString(); } catch (e2) { console.error(e2); }
            }

            if (!diff.trim()) {
              fs.writeFileSync("impact.md", "⚠️ No changes detected.");
              return;
            }

            const prompt = [
              "You are an expert software architect and code analysis AI.",
              "",
              "Given the following Git diff from a Node.js Express repository, analyze the changes and output a dependency diagram in Mermaid format.",
              "",
              "Requirements:",
              "1. List all Express routes (GET, POST, PUT, DELETE) with their full paths that are affected by the code changes.",
              "2. For each affected route, show all functions it calls (including nested calls and imported functions).",
              "3. Show relationships between functions (which function calls which).",
              "4. Optionally, indicate any middleware applied to each route.",
              "",
              "Format your output as a Mermaid flowchart, for example:",
              "",
              "flowchart TD",
              '  Route1["GET /users"] --> FunctionA',
              "  FunctionA --> FunctionB",
              '  Route2["POST /login"] --> AuthMiddleware',
              "  AuthMiddleware --> FunctionC",
              "",
              "Only include routes and functions that are directly or indirectly impacted by the following code changes:",
              "",
              `${diff}`
            ].join('\n');

            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
              method: "POST",
              headers: {
                "Authorization": `Bearer ${process.env.DEEPSEEK_API_KEY}`,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                model: "gpt-4o-mini",   // OpenRouter model
                messages: [
                  { role: "system", content: "You are an AI code reviewer generating Mermaid diagrams." },
                  { role: "user", content: prompt }
                ]
              })
            });

            const data = await response.json();
            if (data.error) {
              fs.writeFileSync("impact.md", `❌ OpenRouter API error: ${data.error.message}`);
              return;
            }

            let diagram = data.choices?.[0]?.message?.content || "No diagram generated.";
            // Wrap in mermaid markdown block for GitHub rendering
            diagram = "```mermaid\n" + diagram + "\n```";
            fs.writeFileSync("impact.md", diagram);
            console.log("✅ Mermaid diagram written to impact.md");
          }

          run().catch(err => {
            fs.writeFileSync("impact.md", `❌ Error running AI diagram: ${err.message}`);
            process.exit(1);
          });
          EOF

          npm install node-fetch@2
          node aiDiagram.js

      - name: Upload diagram artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-diagram
          path: impact.md

      - name: Comment diagram on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ai-diagram
          path: impact.md
