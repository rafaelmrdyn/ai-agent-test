name: AI Route Dependency Diagram

permissions:
  pull-requests: write
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-diagram:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Generate route dependency diagram
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          cat > aiDiagram.js << 'EOF'
          const fs = require('fs');
          const fetch = require('node-fetch');
          const { execSync } = require('child_process');
          const path = require('path');

          function getAllRoutes() {
            try {
              const routesPath = path.join(process.cwd(), 'src/router');
              return execSync(`cat ${routesPath}/*.js`).toString();
            } catch (e) {
              return "// Could not read routes folder";
            }
          }

          async function run() {
            let codeToAnalyze = getAllRoutes();
            
            let diff = '';
            try {
              diff = execSync('git diff origin/main...HEAD').toString();
            } catch (e) {
              diff = '// Could not get git diff';
            }

            console.log("Git diff length:", diff.length);
            console.log("Routes content length:", codeToAnalyze.length);
            
            const prompt = [
              "You are an AI code analysis agent. Analyze the git diff and routes to identify function-level impacts.",
              "",
              "GIT DIFF (changes made):",
              "```",
              diff,
              "```",
              "",
              "EXPRESS ROUTES (current routes):",
              "```",
              codeToAnalyze,
              "```",
              "",
              "INSTRUCTIONS:",
              "1. Analyze the git diff to identify SPECIFIC FUNCTIONS that were changed",
              "2. Look at the routes code to see what endpoints exist and what functions they call",
              "3. For each changed function, identify which routes use/call that function",
              "4. Create a Mermaid flowchart showing ONLY:",
              "   - Changed functions (dark red nodes) - show exact function names like 'updateTodo()'",
              "   - Routes that use those specific functions (dark orange nodes)",
              "   - Clear connections showing which routes depend on which functions",
              "",
              "IMPORTANT:",
              "- Always show changed functions, even if no routes use them directly",
              "- Show ONLY the specific routes that actually use the changed functions (directly or indirectly)",
              "- If a helper function is changed, trace which specific routes use the functions that depend on it",
              "- Be precise: if test() is only used in createTodo(), and createTodo() is only used by POST /api/todos, show only that route",
              "- Do NOT show routes that don't use the changed functions or functions that depend on them",
              "",
              "OUTPUT: Generate ONLY a Mermaid flowchart starting with 'flowchart TD'",
              "Use simple node IDs (no spaces or special chars) and clear relationships.",
              "Example node format: updateTodo[\"updateTodo()\"]",
              "Example style: style updateTodo fill:#d32f2f,stroke:#b71c1c,color:#ffffff"
            ].join('\n');

            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
              method: "POST",
              headers: {
                "Authorization": "Bearer " + process.env.DEEPSEEK_API_KEY,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                model: "deepseek/deepseek-r1:free",
                messages: [
                  { role: "system", content: "You are an AI code reviewer generating Mermaid diagrams." },
                  { role: "user", content: prompt }
                ]
              })
            });

            const data = await response.json();

            let diagram = 'flowchart TD\n  ChangedFiles["Changed Files"]\n  Routes["Routes"]\n  ChangedFiles --> Routes\n  style ChangedFiles fill:#d32f2f,stroke:#b71c1c,color:#ffffff\n  style Routes fill:#1976d2,stroke:#1565c0,color:#ffffff';

            if (!data.error && data.choices?.[0]?.message?.content) {
              let content = data.choices[0].message.content;
              console.log("Raw AI response:", content);
              
              // Extract Mermaid diagram from response
              if (content.includes('flowchart')) {
                const mermaidStart = content.indexOf('flowchart');
                // If the content starts with flowchart, it's likely the whole response is the diagram
                if (mermaidStart === 0 || content.trim().startsWith('flowchart')) {
                  diagram = content.trim();
                } else {
                  // Find the end of the Mermaid block by looking for the closing ```
                  const mermaidEnd = content.indexOf('```', mermaidStart + 3);
                  if (mermaidEnd === -1) {
                    // If no closing ```, use last }
                    const lastBrace = content.lastIndexOf('}');
                    if (lastBrace > mermaidStart) {
                      diagram = content.substring(mermaidStart, lastBrace + 1);
                    } else {
                      // If no closing brace found, take the whole content from flowchart onwards
                      diagram = content.substring(mermaidStart);
                    }
                  } else {
                    diagram = content.substring(mermaidStart, mermaidEnd);
                  }
                }
                console.log("Extracted diagram length:", diagram.length);
                console.log("Diagram starts with:", diagram.substring(0, 50));
                console.log("Diagram ends with:", diagram.substring(diagram.length - 50));
              } else if (content.includes('graph')) {
                const graphStart = content.indexOf('graph');
                const graphEnd = content.lastIndexOf('}') + 1;
                diagram = content.substring(graphStart, graphEnd);
              } else {
                // If no diagram found, create a simple one based on the content
                diagram = 'flowchart TD\n  Analysis["AI Analysis"]\n  Content["' + content.substring(0, 100).replace(/"/g, '\\"') + '..."]\n  Analysis --> Content';
              }
              
              // Clean up the diagram
              diagram = diagram.replace(/```mermaid\s*/g, '').replace(/```\s*$/g, '');
              
              // Clean up Mermaid syntax issues
              diagram = diagram.trim()
                .replace(/\[\[([^\]]+)\]\]/g, '["$1"]') // Fix double brackets
                .replace(/style\s+(\w+)\s+fill:/g, 'style $1 fill:') // Fix style syntax
                .replace(/(\w+)\[\[([^\]]+)\]\]/g, '$1["$2"]') // Fix node definitions with double brackets
                .replace(/(\w+)\s+\[\[([^\]]+)\]\]/g, '$1["$2"]') // Fix node definitions with spaces and double brackets
                .replace(/(\w+)\[\[([^\]]+)\]\]\s+style\s+(\w+)/g, '$1["$2"]\n  style $3') // Fix node with style on same line
                .replace(/\n\s*style\s+(\w+)\s+fill:/g, '\n  style $1 fill:'); // Fix style indentation
              
              console.log("After trimming, diagram length:", diagram.length);
              console.log("After trimming, diagram starts with:", diagram.substring(0, 50));
              
              // Only use fallback if we got an empty response
              if (!diagram.trim()) {
                console.log("Using fallback diagram - original was empty");
                diagram = 'flowchart TD\n  NoChanges["No route changes detected"]\n  Debug["Check debug.txt for details"]\n  NoChanges --> Debug';
              } else {
                console.log("Using extracted diagram");
              }
              
              console.log("Cleaned diagram:", diagram);
            }

            if (data.error) {
              diagram = 'flowchart TD\n  Error["❌ DeepSeek API error: ' + data.error.message + '"]';
            }

            diagram = "```mermaid\n" + diagram + "\n```";
            
            fs.writeFileSync("debug.txt", JSON.stringify({
              apiResponse: data,
              extractedDiagram: diagram,
              routes: codeToAnalyze,
              diff: diff
            }, null, 2));
            
            fs.writeFileSync("impact.md", diagram);
            console.log("✅ Mermaid diagram written to impact.md");
            console.log("📝 Debug info written to debug.txt");
          }

          run().catch(err => {
            fs.writeFileSync("impact.md", "❌ Error running AI diagram: " + err.message);
            process.exit(1);
          });
          EOF

          npm install node-fetch@2
          node aiDiagram.js

      - name: Upload diagram artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-diagram
          path: impact.md

      - name: Comment diagram on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ai-diagram
          path: impact.md
