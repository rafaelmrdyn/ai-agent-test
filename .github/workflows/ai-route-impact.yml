name: AI Code Analysis

on:
  pull_request:
    branches:
      - main

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run AI analysis with DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          cat > aiAnalysis.js <<'EOF'
          import fs from 'fs';
          import fetch from 'node-fetch';
          import { execSync } from 'child_process';

          async function run() {
            const diff = execSync('git diff origin/main...HEAD').toString();

            if (!diff.trim()) {
              console.log("No changes detected.");
              return;
            }

            const response = await fetch("https://api.deepseek.com/chat/completions", {
              method: "POST",
              headers: {
                "Authorization": `Bearer ${process.env.DEEPSEEK_API_KEY}`,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                model: "deepseek-chat",
                messages: [
                  { role: "system", content: "You are an AI code reviewer. Analyze changes in the diff and explain their impact." },
                  { role: "user", content: diff }
                ]
              })
            });

            const data = await response.json();
            if (data.error) {
              console.error("DeepSeek API error:", data.error);
              return;
            }

            const analysis = data.choices?.[0]?.message?.content || "No analysis";
            fs.writeFileSync("impact.md", analysis);
            console.log("✅ Analysis written to impact.md");
          }

          run().catch(err => {
            console.error("❌ Error running AI analysis:", err);
            process.exit(1);
          });
          EOF

          node aiAnalysis.js

      - name: Upload impact.md
        uses: actions/upload-artifact@v4
        with:
          name: ai-analysis
          path: impact.md
