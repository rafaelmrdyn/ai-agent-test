name: AI Route Impact Agent

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install madge glob openai

      - name: Extract routes & deps
        run: node scripts/analyzeRoutes.js

      - name: Get PR diff
        run: git diff ${{ github.event.pull_request.base.sha }} ${{ github.sha }} > pr.diff

      - name: Run AI agent
        run: node scripts/aiAgent.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: impact.md
