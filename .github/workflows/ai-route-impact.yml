name: AI Agent DeepSeek Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get PR diff
        run: |
          git fetch origin main
          git diff origin/main...HEAD > pr.diff

      - name: Run AI agent with DeepSeek
        run: |
          node -e "
          const fs = require('fs');
          const fetch = require('node-fetch');

          const API_KEY = process.env.DEEPSEEK_API_KEY;
          const diff = fs.readFileSync('pr.diff','utf8');
          const routes = fs.existsSync('routes.json') ? JSON.parse(fs.readFileSync('routes.json','utf8')) : {};
          const deps = fs.existsSync('deps.json') ? JSON.parse(fs.readFileSync('deps.json','utf8')) : {};

          const prompt = \`
You are an AI code analysis agent.
Generate a **Markdown report** for GitHub PR comments.

Data provided:
- Git diff
- API routes (routes.json)
- Dependencies (deps.json)

### Instructions:
1. Detect which **routes are impacted** by the changes in the diff (e.g., PUT /users).
2. Show a dependency + route diagram in **Mermaid** combining:
   - API routes as entry points
   - Dependencies they touch
3. Use **pastel colors** for readability:
   - Routes: light blue (#bbf)
   - Services/DB: light green (#bfb)
   - External deps: light pink (#f9f)
4. Example:
   \`\`\`mermaid
   graph TD
   route_users[PUT /users] --> service_users[UserService]
   service_users --> db_users[(users table)]
   style route_users fill:#bbf,stroke:#333,stroke-width:2px
   style service_users fill:#bfb,stroke:#333,stroke-width:2px
   style db_users fill:#f9f,stroke:#333,stroke-width:2px
   \`\`\`

Git diff:
\${diff}

Routes.json:
\${JSON.stringify(routes,null,2)}

Deps.json:
\${JSON.stringify(deps,null,2)}
\`;

          (async()=>{
            try {
              const res = await fetch('https://openrouter.ai/api/v1/chat/completions',{
                method:'POST',
                headers:{
                  'Content-Type':'application/json',
                  'Authorization':\`Bearer \${API_KEY}\`
                },
                body:JSON.stringify({
                  model:'deepseek/deepseek-r1:free',
                  messages:[{role:'user',content:prompt}]
                })
              });

              const data = await res.json();
              let output='No analysis';
              if(data.choices?.[0]?.message?.content){
                output=data.choices[0].message.content;
              }
              fs.writeFileSync('impact.md',output);
              console.log('✅ Analysis written to impact.md');
            } catch (err) {
              console.error('❌ Error calling DeepSeek API:', err);
            }
          })();
          "
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Post PR Comment with Analysis
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: impact.md
