name: AI Route Dependency Diagram

permissions:
  pull-requests: write
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-diagram:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # fetch full history

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Generate route dependency diagram
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          cat > aiDiagram.js <<'EOF'
          const fs = require('fs');
          const fetch = require('node-fetch');
          const { execSync } = require('child_process');

          async function run() {
            let diff = "";
            try {
              diff = execSync('git fetch origin main && git diff origin/main...HEAD').toString();
            } catch (e) {
              console.warn("Git diff failed, using HEAD^ fallback");
              try { diff = execSync('git diff HEAD^').toString(); } catch (e2) { console.error(e2); }
            }

            const prompt = [
              "You are a software architect and code visualization AI.",
              "",
              "Analyze the following Node.js Express repository changes and produce a **valid Mermaid flowchart only** that shows:",
              "",
              "1. Express routes (GET, POST, PUT, DELETE) with full paths.",
              "2. All functions each route calls, including nested and imported ones.",
              "3. Middleware used by routes.",
              "4. Only show functions affected by the code changes.",
              "",
              "Even if there are no detected changes to routes, produce a valid Mermaid flowchart with a placeholder node:",
              "",
              "flowchart TD",
              '  NoChanges["No route changes detected"]',
              "",
              "Git diff:",
              `${diff}`
            ].join('\n');

            const response = await fetch("https://api.deepseek.com/chat/completions", {
              method: "POST",
              headers: {
                "Authorization": `Bearer ${process.env.DEEPSEEK_API_KEY}`,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                model: "deepseek-r1",   // DeepSeek model
                messages: [
                  { role: "system", content: "You are an AI code reviewer generating Mermaid diagrams." },
                  { role: "user", content: prompt }
                ]
              })
            });

            const data = await response.json();
            if (data.error) {
              fs.writeFileSync("impact.md", `❌ DeepSeek API error: ${data.error.message}`);
              return;
            }

            let diagram = data.choices?.[0]?.message?.content || "flowchart TD\n  NoChanges[\"No route changes detected\"]";
            // Wrap in mermaid markdown block for GitHub rendering
            diagram = "```mermaid\n" + diagram + "\n```";
            fs.writeFileSync("impact.md", diagram);
            console.log("✅ Mermaid diagram written to impact.md");
          }

          run().catch(err => {
            fs.writeFileSync("impact.md", `❌ Error running AI diagram: ${err.message}`);
            process.exit(1);
          });
          EOF

          npm install node-fetch@2
          node aiDiagram.js

      - name: Upload diagram artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-diagram
          path: impact.md

      - name: Comment diagram on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ai-diagram
          path: impact.md
