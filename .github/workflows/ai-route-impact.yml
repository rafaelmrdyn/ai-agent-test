name: AI Code Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run AI analysis with DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          # Write temporary script
          cat > aiAnalysis.js <<'EOF'
          const fs = require('fs');
          const fetch = require('node-fetch');
          const { execSync } = require('child_process');

          async function run() {
            let diff = "";
            try {
              diff = execSync('git diff origin/main...HEAD').toString();
            } catch (e) {
              console.error("Git diff error:", e);
            }

            if (!diff.trim()) {
              fs.writeFileSync("impact.md", "⚠️ No changes detected in this PR.");
              return;
            }

            const response = await fetch("https://api.deepseek.com/chat/completions", {
              method: "POST",
              headers: {
                "Authorization": `Bearer ${process.env.DEEPSEEK_API_KEY}`,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                model: "deepseek-chat",
                messages: [
                  { role: "system", content: "You are an AI code reviewer. Analyze the git diff and explain its impact clearly." },
                  { role: "user", content: diff }
                ]
              })
            });

            const data = await response.json();
            if (data.error) {
              fs.writeFileSync("impact.md", `❌ DeepSeek API error: ${data.error.message || JSON.stringify(data.error)}`);
              return;
            }

            const analysis = data.choices?.[0]?.message?.content || "No analysis generated.";
            fs.writeFileSync("impact.md", analysis);
            console.log("✅ Analysis written to impact.md");
          }

          run().catch(err => {
            fs.writeFileSync("impact.md", `❌ Error running AI analysis: ${err.message}`);
            process.exit(1);
          });
          EOF

          npm install node-fetch@2
          node aiAnalysis.js

      - name: Upload impact.md artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-analysis
          path: impact.md

      - name: Comment AI analysis on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ai-analysis
          path: impact.md
